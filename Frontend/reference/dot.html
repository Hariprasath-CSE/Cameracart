<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CameraCart Login</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#46ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#142210",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        /* Custom scrollbar for webkit to blend in */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #142210;
        }

        ::-webkit-scrollbar-thumb {
            background: #2c4823;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #46ec13;
        }

        .glass-panel {
            background: rgba(20, 34, 16, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-x-hidden antialiased">
    <div class="relative min-h-screen flex flex-col items-center justify-center p-4">
        <!-- Background Image with Overlay -->
        <div class="absolute inset-0 z-0">
            <img alt="Blurred photography studio background with camera lenses and soft lighting bokeh"
                class="w-full h-full object-cover opacity-60"
                data-alt="Blurred photography studio background with camera lenses and soft lighting bokeh"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuAp8VgFIuNNdWyfzN_OEV9i_34xV7geIvbHt-YR9NVTRXEe6C4OSr8K5s43oGXiFbnvB7BibExreaUXAPexpMgCidCCFp0PD-xKnI3od-Sk_Cu6wOIKNMPFblYKXX-Axvg9vCpRSLreFtJyTXBgVUon48LJ_i65xQ8Y3BYdMFOWiwFH6gnWAR-d0JmY1bvTWUIRSPDAg0WzpIzPPD1CA_rfNmRwllUyqNdJvxPbcQOADOCL7mj74BTCeGpZSrtNTAPAFbd1EmMl3aE" />
            <!-- Gradient Overlay for cinematic feel -->
            <div
                class="absolute inset-0 bg-gradient-to-b from-[#142210]/80 via-[#142210]/90 to-[#142210] mix-blend-multiply">
            </div>
            <div class="absolute inset-0 bg-black/40"></div>
        </div>
        <!-- Main Content Wrapper -->
        <div class="relative z-10 w-full max-w-[520px] glass-panel rounded-lg p-8 md:p-12 animate-fade-in">
            <!-- Logo Section -->
            <div class="flex items-center justify-center gap-3 mb-8">
                <div
                    class="size-10 bg-primary/10 rounded-full flex items-center justify-center border border-primary/20 text-primary shadow-[0_0_15px_rgba(70,236,19,0.3)]">
                    <span class="material-symbols-outlined text-[24px]">camera</span>
                </div>
                <h2 class="text-white text-2xl font-bold tracking-tight">CameraCart</h2>
            </div>
            <!-- Header Section -->
            <div class="text-center mb-10">
                <h1 class="text-white text-4xl font-black leading-tight tracking-[-0.02em] mb-3">Welcome Back</h1>
                <p class="text-[#9fc992] text-base font-medium">Log in to access your pro gear dashboard.</p>
            </div>
            <!-- Login Form -->
            <form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
                <!-- Email Field -->
                <div class="space-y-2">
                    <label class="block text-white text-sm font-semibold ml-4">Email Address</label>
                    <div class="relative group">
                        <div
                            class="absolute left-5 top-1/2 -translate-y-1/2 text-[#9fc992] group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined text-[20px]">mail</span>
                        </div>
                        <input
                            class="w-full bg-[#1f3319]/80 border border-[#3f6732] text-white placeholder-[#5d8550] text-base rounded-xl h-14 pl-12 pr-5 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300 shadow-inner"
                            placeholder="lensmaster@studio.com" type="email" />
                    </div>
                </div>
                <!-- Password Field -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center ml-4 mr-2">
                        <label class="block text-white text-sm font-semibold">Password</label>
                        <a class="text-sm font-bold text-primary hover:text-white transition-colors" href="#">Forgot
                            Password?</a>
                    </div>
                    <div class="relative group">
                        <div
                            class="absolute left-5 top-1/2 -translate-y-1/2 text-[#9fc992] group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined text-[20px]">lock</span>
                        </div>
                        <input
                            class="w-full bg-[#1f3319]/80 border border-[#3f6732] text-white placeholder-[#5d8550] text-base rounded-xl h-14 pl-12 pr-12 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300 shadow-inner"
                            placeholder="••••••••" type="password" />
                        <button
                            class="absolute right-5 top-1/2 -translate-y-1/2 text-[#9fc992] hover:text-white transition-colors cursor-pointer"
                            type="button">
                            <span class="material-symbols-outlined text-[20px]">visibility_off</span>
                        </button>
                    </div>
                </div>
                <!-- Sign In Button -->
                <button
                    class="w-full h-14 bg-primary hover:bg-[#3bd60f] text-[#152211] text-lg font-bold rounded-full shadow-[0_0_20px_rgba(70,236,19,0.4)] hover:shadow-[0_0_30px_rgba(70,236,19,0.6)] transition-all duration-300 transform hover:-translate-y-0.5 mt-2 flex items-center justify-center gap-2 group">
                    <span>Sign In</span>
                    <span
                        class="material-symbols-outlined text-[20px] transition-transform group-hover:translate-x-1">arrow_forward</span>
                </button>
            </form>
            <!-- Social Login Divider -->
            <div class="flex items-center gap-4 my-8">
                <div class="h-px bg-gradient-to-r from-transparent via-[#3f6732] to-transparent flex-1"></div>
                <span class="text-[#9fc992] text-sm font-medium">Or continue with</span>
                <div class="h-px bg-gradient-to-r from-transparent via-[#3f6732] to-transparent flex-1"></div>
            </div>
            <!-- Social Buttons -->
            <div class="flex gap-4 justify-center">
                <button
                    class="size-12 rounded-full bg-[#1f3319] border border-[#3f6732] flex items-center justify-center hover:bg-[#2c4823] hover:border-primary/50 transition-all duration-300 group">
                    <!-- Google Icon SVG placeholder using material symbol for simplicity in this context, or custom SVG -->
                    <svg class="w-5 h-5 text-white group-hover:scale-110 transition-transform" fill="currentColor"
                        viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4"></path>
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853"></path>
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05"></path>
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335"></path>
                    </svg>
                </button>
                <button
                    class="size-12 rounded-full bg-[#1f3319] border border-[#3f6732] flex items-center justify-center hover:bg-[#2c4823] hover:border-primary/50 transition-all duration-300 group">
                    <svg class="w-6 h-6 text-white group-hover:scale-110 transition-transform" fill="currentColor"
                        viewbox="0 0 24 24">
                        <path
                            d="M17.05 20.28c-.98.95-2.05.88-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.78.79.05 1.97-.67 3.28-.59 1.1.08 2.39.44 3.28 1.48-2.91 1.48-2.43 5.42.27 6.47-.54 1.58-1.28 3.12-1.91 4.83zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.54 4.33-3.74 4.25z">
                        </path>
                    </svg>
                </button>
            </div>
            <!-- Footer Link -->
            <div class="mt-10 text-center">
                <p class="text-[#9fc992] text-sm">
                    Don't have an account?
                    <button class="text-white font-bold hover:text-primary transition-colors ml-1">Join the
                        Pros</button>
                </p>
            </div>
        </div>
        <!-- Simple Footer Info -->
        <div class="relative z-10 mt-8 text-[#9fc992]/60 text-xs font-medium tracking-wide">
            © 2024 CameraCart. Professional Gear Market.
        </div>
    </div>
</body>

</html>
